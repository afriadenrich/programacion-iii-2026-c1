<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REM</title>
    <!-- Tamaño relativo al elemento PADRE -->

    <style>
      #contenedor1 {
        font-size: 100px;
      }

      #contenedor2 {
        font-size: 38px;
      }

      html {
        font-size: 10vw;
      }

      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1.5rem;
      }

      p {
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="contenedor1">
      <div id="contenedor2">
        <h1>Titulo</h1>
        <h2>Subitulo</h2>
        <p>Hola</p>
      </div>
      <div id="contenedor3">
        <p>Mundo</p>
      </div>
    </div>
  </body>
</html>
