<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #container {
        background-color: aqua;
        height: 300px;
        display: flex;
        flex-direction: row;
        justify-content: space-between; /* En fila, aplica horizontalmente */
        align-items: center; /* En fila, este aplica verticalmente*/
      }

      #container2 {
        background-color: rgb(29, 122, 122);
        height: 300px;
        display: flex;
        flex-direction: column;
        justify-content: space-between; /* En colimna, aplica  verticalmente*/
        align-items: center; /* En colimna, este aplica horizontalmente*/
      }
    </style>
  </head>
  <body>
    <div id="container">
      <p>Inicio</p>
      <h1>Productos</h1>
    </div>
    <div id="container2">
      <p>Inicio</p>
      <h1>Productos</h1>
    </div>
  </body>
</html>
