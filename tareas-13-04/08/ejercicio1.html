<!DOCTYPE html>
<html>
  <head>
    <title>YouTube Music</title>
    <link href="./style.css" rel="stylesheet" />
  </head>

  <body>
    <aside>
      <div>
        <button>:::</button>
        <img src="https://music.youtube.com/img/on_platform_logo_dark.svg" />
      </div>

      <button>principal</button>
      <button>explorar</button>
      <button>biblioteca</button>
      <button>acceder</button>
      <p>Accede a tu cuenta para crear...</p>
    </aside>

    <form id="barra-busqueda">
      <div>
        <input type="search" placeholder="Buscar canciones" />
      </div>
      <div>
        <button>...</button>
        <button>acceder</button>
      </div>
    </form>

    <main>
      <form id="tematica">
        <button>Para sentirte bien</button>
        <button>Entrenamiento</button>
        <button>Energia</button>
        <button>Viaje diaro</button>
        <button>Fiesta</button>
      </form>

      <form id="seleccion-rapida">
        <div>
          <p>Seleccion rapida</p>
        </div>
        <div>
          <button>Reproducir todo</button>
          <!-- less than -->
          <button>&lt</button>
          <!-- greater than -->
          <button>&gt;</button>
        </div>
      </form>

      <form id="canciones-seleccion-rapida">
        <!-- no se como poner el nombre del artista abajo del titulo de la cancion. Tampoco como hacer para que no se separen horizontalmente los botones-->
        <button>
          <img
            src="https://rockcellarmagazine.com/wp-content/uploads/2022/11/guns-n-roses-use-your-illusion-super-deluxe-box-set.jpg"
            height="100px"
            title="november rain"
          />
          <strong>November rain</strong>
          <p>Guns n Roses</p>
        </button>

        <button>
          <img
            src="https://upload.wikimedia.org/wikipedia/en/9/95/Gotye_-_Making_Mirrors.png"
            height="100px"
            title="somebody that i used to know"
          />
          <strong>Somebody that i used to know</strong>
          <p>Gotye</p>
        </button>

        <button>
          <img
            src="https://cdn-images.dzcdn.net/images/cover/f840891b70f6e240b8ecaec49346bd6a/500x500.jpg"
            height="100px"
            title="monaco"
          />
          <strong>Monaco</strong>
          <p>Bad Bunny</p>
        </button>

        <button>
          <img
            src="https://i1.sndcdn.com/artworks-000002794667-1z16il-t500x500.jpg"
            height="100px"
            title="tu sin mi - dread mar i"
          />
          <strong>Tu sin mi</strong>
          <p>Dread Mar I</p>
        </button>

        <button>
          <img
            src="https://i.scdn.co/image/ab67616d0000b273a2982eadad9b21912ed6c2e8"
            height="100px"
            title="Tentative - system of a down"
          />
          <strong>Tentative</strong>
          <p>System of a down</p>
        </button>

        <button>
          <img
            src="https://f4.bcbits.com/img/a2556596728_16.jpg"
            height="100px"
            title="La noche - Fin del mundo"
          />
          <strong>La noche</strong>
          <p>Fin del mundo</p>
        </button>

        <button>
          <img
            src="https://s.mxmcdn.net/images-storage/albums2/3/8/7/5/2/0/59025783_500_500.jpg"
            height="100px"
            title="XXYY - Mujer cebra"
          />
          <strong>XXYY</strong>
          <p>Mujer cebra</p>
        </button>

        <button>
          <img
            src="https://crazyminds.es/wp-content/uploads/187224753_2270992699702814_4343170838178418169_n1.jpg"
            height="100px"
            title="Invisible - Duran Duran"
          />
          <strong>Invisible</strong>
          <p>Duran Duran</p>
        </button>
      </form>

      <form id="esenciales">
        <div>
          <header>Los exitos de todos los generos musicales</header>
          <h1>Esenciales de todos los tiempos</h1>
        </div>

        <div>
          <button><</button>
          <button>></button>
        </div>
      </form>

      <form id="esenciales-botones">
        <button>
          <img
            src="https://d1csarkz8obe9u.cloudfront.net/posterpreviews/pop-album-art-design-template-905e52dee4423a5f33b0c508665cf7bf_screen.jpg?ts=1598362553"
            height="300px"
          />
        </button>
        <button>
          <img
            src="https://d1csarkz8obe9u.cloudfront.net/posterpreviews/album-cover-rock-design-template-474dd69956f8aecd3753ef33f13d3a65_screen.jpg?ts=1678575212"
            height="300px"
          />
        </button>
        <button>
          <img
            src="https://d1csarkz8obe9u.cloudfront.net/posterpreviews/electronic-music-album-cover-template-design-12b51a1ad56ef5851bc8068dd8c79aaf_screen.jpg?ts=1742998014"
            height="300px"
          />
        </button>
        <button>
          <img
            src="https://image-cdn-ak.spotifycdn.com/image/ab67706c0000da8428b9288398c47498847be403"
            height="300px"
          />
        </button>
      </form>
    </main>
  </body>
</html>
